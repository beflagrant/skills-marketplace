name: Validate marketplace

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Validate marketplace and plugin manifests
        run: ruby .github/scripts/validate_marketplace.rb
